name: Build LSPosed Module

on:
  push:
    branches: [ "main" ] # 或者是 master，看你的默认分支叫什么
    tags:
      - 'v*' # 当你推送形如 v1.0.0 的 tag 时自动触发 Release
  workflow_dispatch: # 支持在 GitHub 页面上点击按钮手动触发编译

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew || gradle wrapper # 防止本地缺失 gradlew

    - name: Build with Gradle
      run: ./gradlew assembleRelease

    - name: Get Version Name
      id: get_version
      run: |
        echo "VERSION_TAG=v1.0.${{ github.run_number }}" >> $GITHUB_ENV

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: DashenHookModule
        path: app/build/outputs/apk/release/app-release-unsigned.apk

    - name: Create Release and Upload APK
      if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.VERSION_TAG }}
        name: "网易大神自动拦截模块 ${{ env.VERSION_TAG }}"
        body: |
          LSPosed 编译产物全自动生成。
          - 自动注入目标: `com.netease.gl`
          - 数据同步路径: `/sdcard/Android/data/com.netease.gl/files/dashen_vault.json`
        draft: false
        prerelease: false
        files: |
          app/build/outputs/apk/release/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}